<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibez Cast Receiver</title>
    <!-- Google Cast Receiver SDK -->
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
      body {
        margin: 0;
        background-color: #000;
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #static-loading {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 0;
      }
      .pulse-text {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        font-weight: bold;
        font-size: 2rem;
        background: linear-gradient(to right, #ec4899, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
    </style>
  </head>
  <body>
    <div id="static-loading">
      <div class="pulse-text">Vibez Cast</div>
      <p style="margin-top: 1rem; opacity: 0.7;">Initializing...</p>
    </div>
    <div id="root" style="position: relative; z-index: 1;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
