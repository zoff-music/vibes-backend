services:
  caddy:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../Caddyfile.docker:/etc/caddy/Caddyfile:ro

  frontend:
    ports:
      - "3000:3000"
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - VITE_CAST_LOCAL_EMULATOR=true
      - DEBUG=${DEBUG:-}
      - VITE_DEBUG=${VITE_DEBUG:-}
    command:
      [
        "sh",
        "-c",
        "corepack enable && corepack prepare pnpm@10.20.0 --activate && pnpm install && PORT=3000 pnpm dev -- --host 0.0.0.0 --port 3000",
      ]

  cast:
    build:
      context: ..
      target: frontend-cast-prod
    ports:
      - "3003:3003"
    volumes:
      - ../client/frontend/render:/app
      - frontend_node_modules:/app/node_modules
    command:
      [
        "sh",
        "-c",
        "corepack enable && corepack prepare pnpm@10.20.0 --activate && pnpm install && pnpm --filter @vibez/cast dev -- --host 0.0.0.0 --port 3003",
      ]
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - DEBUG=${DEBUG:-}
      - VITE_DEBUG=${VITE_DEBUG:-}
    stdin_open: true
    tty: true

  cast-emulator:
    image: node:20
    working_dir: /app
    command:
      - sh
      - -c
      - >
        if [ -z "$CAST_EMULATOR_SCENARIO" ]; then
          echo "Cast emulator: no scenario provided, skipping";
          exit 0;
        fi;
        npx --yes chromecast-device-emulator start "$CAST_EMULATOR_SCENARIO" $CAST_EMULATOR_ARGS
    environment:
      - CAST_APP_ID=${VITE_CAST_APP_ID:-1FAF5D9F}
      - CAST_RECEIVER_URL=${VITE_CAST_RECEIVER_URL:-https://localhost/casting/receiver/}
      - CAST_DEVICE_NAME=${CAST_DEVICE_NAME:-Vibez Emulator}
      - CAST_EMULATOR_SCENARIO=${CAST_EMULATOR_SCENARIO:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
