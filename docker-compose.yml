services:
  backend:
    build:
      context: .
      target: ${BACKEND_BUILD_TARGET:-backend-prod}
    ports:
      - "${BACKEND_PORT_MAPPING:-42070:8080}"
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - db_data:/data/db
    command: ${BACKEND_CMD_OVERRIDE:-}
    restart: unless-stopped

volumes:
  db_data:
    name: vibes_db_shared
    external: true
