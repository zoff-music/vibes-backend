services:
  backend:
    build:
      context: .
      target: backend-dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/go/src/github.com/zoff-music/vibes

  frontend:
    build:
      context: .
      target: frontend-dev
    ports:
      - "19006:19006"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-c", "bun install && bun run dev:web -- --host 0.0.0.0 --port 19006"]
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules:
