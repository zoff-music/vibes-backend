services:
  caddy:
    image: caddy:2.9.1
    ports:
      - "${CADDY_PORT:-42069}:42069"
      - "2020:2020"
    volumes:
      - ./${CADDYFILE:-Caddyfile}:/etc/caddy/Caddyfile:ro
      # Add volume for caddy data to persist certs if needed
      - caddy_data:/data
      - caddy_config:/config
      - cast_static_blue:/srv/cast/blue:ro
      - cast_static_green:/srv/cast/green:ro
    environment:
      - BACKEND_UPSTREAM=backend:8080
      - PLATFORM_UPSTREAM=frontend-platform:3000
      - CAST_ROOT=${CAST_ROOT:-/srv/cast/blue}
    depends_on:
      - backend
      - frontend-platform
      - frontend-cast
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2020/config/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: .
      target: ${BACKEND_BUILD_TARGET:-backend-dev}
    ports:
      - "${BACKEND_PORT:-42070}:8080"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - DATABASE_PATH=/data/db/vibes.db
    volumes:
      - ${BACKEND_MOUNT_SRC:-.}:${BACKEND_MOUNT_DEST:-/go/src/github.com/zoff-music/vibes}:ro
      - db_data:/data/db
    command: ${BACKEND_CMD_OVERRIDE:-}
    depends_on:
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/_healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  migrator:
    build:
      context: .
      target: migrator-prod
    command: ["-db", "/data/db/vibes.db"]
    volumes:
      - db_data:/data/db

  frontend-platform:
    build:
      context: .
      target: ${FRONTEND_PLATFORM_TARGET:-frontend-dev}
    ports:
      - "${FRONTEND_PLATFORM_PORT:-3000}:3000"
    volumes:
      - ${FRONTEND_MOUNT_SRC:-./frontend}:${FRONTEND_MOUNT_DEST:-/app}
      - frontend_node_modules:/app/node_modules
    command: ${FRONTEND_PLATFORM_CMD_OVERRIDE:-sh -c "bun install && bun --filter @vibez/platform ${FRONTEND_CMD:-dev}"}
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend-cast:
    build:
      context: .
      target: ${FRONTEND_CAST_TARGET:-frontend-dev}
    ports:
      - "${FRONTEND_CAST_PORT:-3001}:${FRONTEND_CAST_INTERNAL_PORT:-3001}"
    volumes:
      - ${FRONTEND_MOUNT_SRC:-./frontend}:${FRONTEND_MOUNT_DEST:-/app}
      - frontend_node_modules:/app/node_modules
      - cast_static_blue:/app/static_blue
      - cast_static_green:/app/static_green
    command: ${FRONTEND_CAST_CMD_OVERRIDE:-sh -c "bun install && bun --filter @vibez/cast ${FRONTEND_CMD:-dev}"}
    environment:
      - PORT=${FRONTEND_CAST_INTERNAL_PORT:-3001}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${FRONTEND_CAST_INTERNAL_PORT:-3001}"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  frontend_node_modules:
  caddy_data:
  caddy_config:
  db_data:
    name: vibes_db_shared
    external: true
  cast_static_blue:
  cast_static_green:
